spring:
  application:
    name: it-top-ai-executor

  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

  ai:
    chat:
      observations:
        log-prompt: true
        log-completion: true
    mistralai:
      api-key: ${MISTRALAI_API_KEY}
      chat:
        options:
          model: ${MISTRAL_MODEL:mistral-large-latest}

  cloud:
    aws:
      s3:
        endpoint: ${S3_ENDPOINT}
        region: ${S3_REGION:us-east-1}
        path-style-access-enabled: true
      credentials:
        access-key: ${S3_ACCESS_KEY}
        secret-key: ${S3_SECRET_KEY}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/it_top_executor}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  config:
    import: optional:file:.env[.properties]

  messages:
    basename: i18n/messages
    encoding: UTF-8

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.request.size: 5242880
    consumer:
      group-id: it-top-ai-executor
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 1
    listener:
      ack-mode: manual
      observation-enabled: true
    template:
      observation-enabled: true

server:
  port: 8082

kafka:
  homework-execution-topic: homework-execution
  homework-result-topic: homework-result

s3:
  bucket: ${S3_BUCKET:homeworks-solutions}

it-top-ai:
  base-url: ${IT_TOP_AI_BASE_URL:http://localhost:8080}

homework:
  download:
    allowed-hosts: ${HOMEWORK_DOWNLOAD_ALLOWED_HOSTS:localhost,127.0.0.1,*.top-academy.ru}
    connect-timeout: ${HOMEWORK_DOWNLOAD_CONNECT_TIMEOUT:5s}
    read-timeout: ${HOMEWORK_DOWNLOAD_READ_TIMEOUT:30s}
    max-file-size: ${HOMEWORK_DOWNLOAD_MAX_FILE_SIZE:20MB}

logging:
  pattern:
    correlation: "[%X{traceId:-} ${spring.application.name}] "
  level:
    org.apache.kafka: INFO
    com.aquadev: DEBUG

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: "health"
  endpoint:
    health:
      show-components: always
      show-details: always
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
  otlp:
    metrics:
      export:
        enabled: false