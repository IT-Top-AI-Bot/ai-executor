spring:
  application:
    name: ai-executor

  config:
    import: "optional:configserver:"

  cloud:
    config:
      uri: "http://${CONFIG_SERVER_HOST:config-server}:${CONFIG_SERVER_PORT:8888}"
      username: ${CONFIG_SERVER_USERNAME}
      password: ${CONFIG_SERVER_PASSWORD}
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 5
