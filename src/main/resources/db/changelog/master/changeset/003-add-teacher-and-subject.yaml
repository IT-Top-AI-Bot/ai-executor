databaseChangeLog:
  - changeSet:
      id: 003-add-teacher-and-subject
      author: aqua
      changes:
        - createTable:
            tableName: teacher
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_teacher
                    nullable: false
              - column:
                  name: fio
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_teacher_fio

        - createTable:
            tableName: subject
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_subject
                    nullable: false
              - column:
                  name: api_subject_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_subject_api_subject_id
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: teacher_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_subject_teacher
                    references: teacher(id)
