name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:18.1-alpine
        env:
          POSTGRES_DB: it_top_executor
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d it_top_executor"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_URL: jdbc:postgresql://localhost:5432/it_top_executor
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      SPRING_KAFKA_LISTENER_AUTO_STARTUP: "false"
      MISTRALAI_API_KEY: dummy
      RUSTFS_ACCESS_KEY: dummy
      RUSTFS_SECRET_KEY: dummy
      S3_BUCKET: homeworks-solutions
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      IT_TOP_AI_BASE_URL: http://localhost:8080

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@f236b35da9d031e13b1005234ebe4392ed54c580 # v5.0.0

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew --no-daemon clean test

      - name: Build bootJar
        run: ./gradlew --no-daemon bootJar

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-reports
          path: |
            build/reports/tests/test
            build/test-results/test